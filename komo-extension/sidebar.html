<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>komo</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <!-- Command Bar Overlay -->
  <div id="command-bar-overlay" class="hidden">
    <div id="command-bar">
      <div id="command-bar-input-row">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="command-bar-input" type="text" placeholder="Search tabs, links, or enter URL..." autofocus>
      </div>
      <div id="command-bar-results"></div>
    </div>
  </div>

  <!-- Save Link Panel -->
  <div id="save-link-overlay" class="hidden">
    <div id="save-link-panel">
      <div class="save-header">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Save Link</span>
        <button id="save-link-close" class="icon-btn">&times;</button>
      </div>
      <div id="save-link-url" class="save-url"></div>
      <input id="save-link-title" type="text" placeholder="Title">
      <div id="save-link-tags" class="tag-container"></div>
      <input id="save-link-tag-input" type="text" placeholder="Add tag...">
      <div id="save-link-suggestions" class="tag-suggestions"></div>
      <textarea id="save-link-notes" placeholder="Notes (optional)" rows="2"></textarea>
      <div class="save-actions">
        <button id="save-link-cancel" class="btn-secondary">Cancel</button>
        <button id="save-link-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Main Sidebar -->
  <div id="sidebar">
    <!-- Tabs View (default) -->
    <div id="tabs-view">
      <!-- New Tab Button -->
      <button id="new-tab-btn" class="new-tab-btn">
        <span class="plus">+</span> New Tab
      </button>

      <!-- Tab List -->
      <div id="pinned-section" class="hidden">
        <div class="section-header">Pinned</div>
        <div id="pinned-tabs"></div>
      </div>

      <div id="folders-container"></div>

      <div class="section-header">
        <span>Tabs</span>
        <span id="tab-count" class="count-badge">0</span>
      </div>
      <div id="tab-list"></div>
    </div>

    <!-- Scout View -->
    <div id="scout-view" class="hidden">
      <div id="scout-content"></div>
    </div>

    <!-- Library View -->
    <div id="library-view" class="hidden">
      <div id="library-content"></div>
    </div>

    <!-- Bottom Bar -->
    <div id="bottom-bar">
      <button id="downloads-btn" class="icon-btn" title="Downloads">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button id="scout-btn" class="icon-btn" title="Scout">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.5 3.2 3.5.5-2.5 2.4.6 3.5L12 11l-3.1 1.6.6-3.5L7 6.7l3.5-.5z"/><path d="M5 19l1 2.4 2.6.4-1.9 1.8.5 2.6L5 25l-2.2 1.2.5-2.6L1.4 21.8l2.6-.4z" transform="scale(0.5) translate(2,14)"/><path d="M5 19l1 2.4 2.6.4-1.9 1.8.5 2.6L5 25l-2.2 1.2.5-2.6L1.4 21.8l2.6-.4z" transform="scale(0.5) translate(34,14)"/></svg>
      </button>
      <button id="library-btn" class="icon-btn" title="Library">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button id="new-folder-btn" class="icon-btn" title="New Folder">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      </button>
    </div>

    <!-- Downloads Popover -->
    <div id="downloads-popover" class="hidden">
      <div class="popover-header">Downloads</div>
      <div id="downloads-list"></div>
    </div>
  </div>

  <script src="models/tab_manager.js"></script>
  <script src="models/link_store.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
